<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  background: #0C2C30;
  font-family: 'Ubuntu', sans-serif;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 80px 72px 96px;
}
.tag {
  font-size: 20px; font-weight: 500;
  color: #00C5A0; letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 52px;
}
.headline {
  font-size: 72px; font-weight: 700;
  color: #FFFFFF; line-height: 1.1;
  margin-bottom: 36px;
}
.line {
  width: 56px; height: 2px;
  background: #00C5A0; margin-bottom: 36px;
}
.subheadline {
  font-size: 36px; font-weight: 400;
  color: rgba(255,255,255,0.70); line-height: 1.55;
}
.progress-bar {
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 3px;
  background: rgba(255,255,255,0.12);
}
.progress-fill {
  height: 100%; width: 11%;
  background: rgba(255,255,255,0.40);
}
</style>
</head>
<body>
  <div class="tag">Gestão Leiteira</div>
  <div class="headline">Quais indicadores<br>sua fazenda<br>acompanha<br>todo mês?</div>
  <div class="line"></div>
  <div class="subheadline">Se a resposta é "poucos" ou "nenhum",<br>este conteúdo é para você.</div>
  <div class="progress-bar"><div class="progress-fill"></div></div>
</body>
</html>
