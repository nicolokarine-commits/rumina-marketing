<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  font-family: 'Ubuntu', sans-serif;
  position: relative; overflow: hidden;
  background: #071E22;
}

/* Background image */
.bg-image {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 30%;
}

/* Gradient overlay — dark teal from bottom, lighter on top */
.overlay {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(
    180deg,
    rgba(7,30,34,0.45) 0%,
    rgba(7,30,34,0.55) 35%,
    rgba(7,30,34,0.82) 65%,
    rgba(7,30,34,0.97) 100%
  );
}

/* Content */
.content {
  position: absolute;
  bottom: 116px; left: 0; right: 0;
  padding: 0 72px;
  display: flex; flex-direction: column;
}
.tag {
  font-size: 19px; font-weight: 500;
  color: #00C5A0; letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 44px;
}
.headline {
  font-size: 68px; font-weight: 700;
  color: #FFFFFF; line-height: 1.08;
  margin-bottom: 32px;
}
.headline em {
  font-style: normal;
  color: #00C5A0;
}
.line {
  width: 56px; height: 2px;
  background: #00C5A0; margin-bottom: 28px;
}
.subheadline {
  font-size: 33px; font-weight: 400;
  color: rgba(255,255,255,0.72); line-height: 1.50;
}

/* Footer logos */
.footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 18px 72px 34px;
  display: flex; align-items: center;
  justify-content: space-between;
  border-top: 1px solid rgba(255,255,255,0.12);
  background: rgba(7,30,34,0.60);
}
.logo-rumina { height: 34px; }
.logo-ideagri { height: 28px; }

/* Progress bar */
.progress-bar {
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 3px;
  background: rgba(255,255,255,0.10);
}
.progress-fill {
  height: 100%; width: 11%;
  background: #00C5A0;
}
</style>
</head>
<body>
  <img class="bg-image" src="../imagens/leite-02.jpg" alt="">
  <div class="overlay"></div>

  <div class="content">
    <div class="tag">Gestão Leiteira</div>
    <div class="headline">Quais indicadores<br>sua fazenda<br>acompanha<br><em>todo mês?</em></div>
    <div class="line"></div>
    <div class="subheadline">Se a resposta é "poucos" ou "nenhum",<br>este conteúdo é para você.</div>
  </div>

  <div class="footer">
    <img class="logo-rumina" src="../imagens/logo-rumina-escuro.png" alt="Rúmina">
    <img class="logo-ideagri" src="../imagens/logo-ideagri-escuro.png" alt="Ideagri">
  </div>

  <div class="progress-bar"><div class="progress-fill"></div></div>
</body>
</html>
