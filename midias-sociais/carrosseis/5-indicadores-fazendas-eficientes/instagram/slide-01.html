<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  font-family: 'Ubuntu', sans-serif;
  background-image: url('../imagens/leite-02.jpg');
  background-size: cover;
  background-position: center;
  position: relative;
  overflow: hidden;
}
.overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(12,44,48,0.75) 0%, rgba(6,26,29,0.75) 100%);
  z-index: 1;
}
.accent-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 6px; background: #00C5A0;
  z-index: 2;
}
.content {
  position: absolute; bottom: 120px; left: 0; right: 0;
  padding: 0 72px;
  z-index: 2;
}
.tag {
  font-size: 14px; font-weight: 700;
  color: #00C5A0; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 24px;
}
.headline {
  font-size: 72px; font-weight: 700;
  color: #FFFFFF; line-height: 1.08;
  margin-bottom: 20px;
}
.subtitle {
  font-size: 32px; font-weight: 400;
  color: rgba(255,255,255,0.80); line-height: 1.35;
}
.progress-bar {
  position: absolute; bottom: 0; left: 0;
  width: 11%; height: 3px;
  background: #00C5A0; z-index: 3;
}
</style>
</head>
<body>
  <div class="overlay"></div>
  <div class="accent-bar"></div>
  <div class="content">
    <div class="tag">Gestão Leiteira</div>
    <div class="headline">Quais indicadores sua fazenda acompanha todo mês?</div>
    <div class="subtitle">Se a resposta é "poucos" ou "nenhum", este conteúdo é para você.</div>
  </div>
  <div class="progress-bar"></div>
</body>
</html>
