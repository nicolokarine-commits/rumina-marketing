<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Ubuntu', sans-serif; background: linear-gradient(135deg, #061A1D 0%, #0B2E3C 50%, #071E22 100%); position: relative; overflow: hidden; }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #00C5A0; z-index: 1; }
.content { position: absolute; top: 50%; left: 72px; right: 72px; transform: translateY(-50%); }
.tag { font-size: 14px; font-weight: 700; color: #00C5A0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
.headline { font-size: 72px; font-weight: 700; color: #FFFFFF; line-height: 1.08; margin-bottom: 32px; }
.line { width: 48px; height: 3px; background: #00C5A0; margin-bottom: 32px; }
.body { font-size: 38px; font-weight: 400; color: rgba(255,255,255,0.80); line-height: 1.45; }
.progress-bar { position: absolute; bottom: 0; left: 0; width: 33%; height: 3px; background: #00C5A0; z-index: 1; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="content">
    <div class="tag">O Problema</div>
    <div class="headline">Sem indicadores, a decisão vira achismo.</div>
    <div class="line"></div>
    <div class="body">Quando a produção cai, o produtor que não monitora só descobre depois do fechamento do mês — tarde demais pra corrigir. O que separa a gestão reativa da gestão eficiente é o tempo de resposta.</div>
  </div>
  <div class="progress-bar"></div>
</body>
</html>
