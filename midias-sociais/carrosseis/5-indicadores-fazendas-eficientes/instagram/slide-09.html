<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  font-family: 'Ubuntu', sans-serif;
  background: linear-gradient(140deg, #061A1D 0%, #0B2E3C 50%, #071E22 100%);
  position: relative; overflow: hidden;
}
.dots {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(0,197,160,0.10) 1.5px, transparent 1.5px);
  background-size: 28px 28px;
}
/* Tablet showcase — centered, upper portion */
.tablet-wrap {
  position: absolute;
  left: 50%; top: 60px;
  transform: translateX(-50%);
  width: 780px; height: 720px;
  overflow: hidden;
  z-index: 2;
}
.tablet-img {
  width: 100%;
  height: auto;
  display: block;
}
/* Bottom gradient to blend tablet into background */
.tablet-fade {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 380px;
  z-index: 3;
  background: linear-gradient(180deg, transparent 0%, rgba(6,26,29,0.85) 50%, rgba(6,26,29,1) 100%);
}
/* Side fades */
.tablet-side-fade-left {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 100px; z-index: 3;
  background: linear-gradient(90deg, rgba(6,26,29,1), transparent);
}
.tablet-side-fade-right {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 100px; z-index: 3;
  background: linear-gradient(270deg, rgba(6,26,29,1), transparent);
}
/* Brand rings in background */
.ring-left {
  position: absolute; left: -120px; top: 400px;
  width: 400px; height: 400px;
  border-radius: 50%;
  border: 50px solid rgba(0,197,160,0.05);
  z-index: 1;
}
.ring-right {
  position: absolute; right: -120px; bottom: 200px;
  width: 300px; height: 300px;
  border-radius: 50%;
  border: 40px solid rgba(0,197,160,0.04);
  z-index: 1;
}
/* Content */
.content {
  position: absolute;
  bottom: 116px; left: 0; right: 0;
  padding: 0 72px;
  z-index: 10;
  text-align: left;
}
.tag {
  font-size: 18px; font-weight: 500;
  color: #00C5A0; letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 32px;
}
.headline {
  font-size: 60px; font-weight: 700;
  color: #FFFFFF; line-height: 1.06;
  margin-bottom: 28px;
}
.headline em { font-style: normal; color: #00C5A0; }
.line {
  width: 48px; height: 2px;
  background: #00C5A0; margin-bottom: 24px;
}
.body {
  font-size: 30px; font-weight: 400;
  color: rgba(255,255,255,0.68); line-height: 1.52;
  margin-bottom: 36px;
}
.cta {
  font-size: 24px; font-weight: 500;
  color: #00C5A0; letter-spacing: 1px;
}
/* Footer */
.footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 18px 72px 34px;
  display: flex; align-items: center;
  justify-content: space-between;
  border-top: 1px solid rgba(255,255,255,0.10);
  background: rgba(6,26,29,0.85);
  z-index: 10;
}
.logo-rumina { height: 34px; }
.logo-ideagri { height: 28px; }
.progress-bar {
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 3px;
  background: rgba(255,255,255,0.10);
  z-index: 11;
}
.progress-fill { height: 100%; width: 100%; background: #00C5A0; }
</style>
</head>
<body>
  <div class="dots"></div>
  <div class="ring-left"></div>
  <div class="ring-right"></div>

  <!-- Tablet featured -->
  <div class="tablet-wrap">
    <img class="tablet-img" src="../imagens/tela-tablet.png" alt="">
    <div class="tablet-fade"></div>
    <div class="tablet-side-fade-left"></div>
    <div class="tablet-side-fade-right"></div>
  </div>

  <div class="content">
    <div class="tag">Ideagri</div>
    <div class="headline">Todos esses indicadores<br>em <em>um único painel</em>,<br>em tempo real.</div>
    <div class="line"></div>
    <div class="body">Produção, reprodução, sanidade e financeiro centralizados — com alertas automáticos e análise por IA.</div>
    <div class="cta">Conheça o Ideagri → rumina.com.br</div>
  </div>

  <div class="footer">
    <img class="logo-rumina" src="../imagens/logo-rumina-escuro.png" alt="Rúmina">
    <img class="logo-ideagri" src="../imagens/logo-ideagri-escuro.png" alt="Ideagri">
  </div>

  <div class="progress-bar"><div class="progress-fill"></div></div>
</body>
</html>
