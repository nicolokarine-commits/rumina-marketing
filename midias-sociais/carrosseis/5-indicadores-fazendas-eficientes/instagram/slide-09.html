<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Ubuntu', sans-serif; background: linear-gradient(135deg, #061A1D 0%, #0B2E3C 50%, #071E22 100%); position: relative; overflow: hidden; }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #00C5A0; z-index: 1; }
.tablet-wrap { position: absolute; left: 50%; top: 60px; transform: translateX(-50%); width: 780px; height: 720px; overflow: hidden; z-index: 2; }
.tablet-img { width: 100%; height: auto; display: block; }
.tablet-fade { position: absolute; left: 0; right: 0; bottom: 0; height: 380px; z-index: 3; background: linear-gradient(180deg, transparent 0%, rgba(6,26,29,0.85) 50%, rgba(6,26,29,1) 100%); }
.tablet-side-fade-left { position: absolute; left: 0; top: 0; bottom: 0; width: 100px; z-index: 3; background: linear-gradient(90deg, rgba(6,26,29,1), transparent); }
.tablet-side-fade-right { position: absolute; right: 0; top: 0; bottom: 0; width: 100px; z-index: 3; background: linear-gradient(270deg, rgba(6,26,29,1), transparent); }
.content { position: absolute; bottom: 116px; left: 0; right: 0; padding: 0 72px; z-index: 10; text-align: left; }
.tag { font-size: 16px; font-weight: 700; color: #00C5A0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
.headline { font-size: 60px; font-weight: 700; color: #FFFFFF; line-height: 1.08; margin-bottom: 24px; }
.headline em { font-style: normal; color: #00C5A0; }
.line { width: 48px; height: 3px; background: #00C5A0; margin-bottom: 24px; }
.body { font-size: 30px; font-weight: 400; color: rgba(255,255,255,0.75); line-height: 1.45; margin-bottom: 36px; }
.cta { font-size: 24px; font-weight: 500; color: #00C5A0; letter-spacing: 1px; }
.footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 72px 34px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.10); background: rgba(6,26,29,0.85); z-index: 10; }
.logo-rumina { height: 34px; }
.logo-ideagri { height: 28px; }
.progress-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #00C5A0; z-index: 11; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  
  <div class="tablet-wrap">
    <img class="tablet-img" src="../imagens/tela-tablet.png" alt="Ideagri em tablet">
    <div class="tablet-fade"></div>
    <div class="tablet-side-fade-left"></div>
    <div class="tablet-side-fade-right"></div>
  </div>

  <div class="content">
    <div class="tag">Ideagri</div>
    <div class="headline">Todos esses indicadores em <em>um único painel</em>, em tempo real.</div>
    <div class="line"></div>
    <div class="body">Produção, reprodução, sanidade e financeiro centralizados — com alertas automáticos e análise por IA.</div>
    <div class="cta">Conheça o Ideagri → rumina.com.br</div>
  </div>

  <div class="footer">
    <img class="logo-rumina" src="../imagens/logo-rumina-escuro.png" alt="Rúmina">
    <img class="logo-ideagri" src="../imagens/logo-ideagri-escuro.png" alt="Ideagri">
  </div>

  <div class="progress-bar"></div>
</body>
</html>
