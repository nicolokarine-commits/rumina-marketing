<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Ubuntu', sans-serif; background: linear-gradient(135deg, #061A1D 0%, #0B2E3C 50%, #071E22 100%); position: relative; overflow: hidden; }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #00C5A0; z-index: 1; }
.phone { position: absolute; left: 80px; top: 180px; width: 450px; z-index: 2; }
.phone img { width: 100%; height: auto; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.40)); }
.phone-fade { position: absolute; left: 0; bottom: 100px; width: 450px; height: 200px; background: linear-gradient(180deg, transparent, rgba(6,26,29,1)); z-index: 3; }
.tag { font-size: 14px; font-weight: 700; color: #00C5A0; letter-spacing: 2px; text-transform: uppercase; }
.stat-label { font-size: 18px; font-weight: 400; color: rgba(255,255,255,0.50); margin-bottom: 8px; margin-top: 20px; }
.stat-value { font-size: 56px; font-weight: 700; color: #00C5A0; line-height: 1.0; margin-bottom: 12px; }
.headline { font-size: 44px; font-weight: 700; color: #FFFFFF; line-height: 1.1; margin-bottom: 20px; }
.line { width: 48px; height: 3px; background: #00C5A0; margin-bottom: 20px; }
.body { font-size: 28px; font-weight: 400; color: rgba(255,255,255,0.75); line-height: 1.40; }
.content { position: absolute; bottom: 120px; left: 550px; right: 72px; }
.progress-bar { position: absolute; bottom: 0; left: 0; width: 56%; height: 3px; background: #00C5A0; z-index: 1; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="phone">
    <img src="../imagens/tela-app.png" alt="Ideagri">
    <div class="phone-fade"></div>
  </div>
  <div class="content">
    <div class="tag">Indicador 02</div>
    <div class="stat-label">CCS no tanque</div>
    <div class="stat-value">&lt; 200k</div>
    <div class="line"></div>
    <div class="headline">Saúde do úbere</div>
    <div class="body">Contagem de Células Somáticas é o termômetro da mastite subclínica. Acima de 400 mil, rebanhos perdem entre 5% e 20% de produção — muitas vezes sem sintoma visível.</div>
  </div>
  <div class="progress-bar"></div>
</body>
</html>
