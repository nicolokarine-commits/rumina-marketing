<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  font-family: 'Ubuntu', sans-serif;
  background: linear-gradient(140deg, #061A1D 0%, #0B2E3C 55%, #071E22 100%);
  position: relative; overflow: hidden;
}
/* Dot grid texture */
.dots {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(0,197,160,0.11) 1.5px, transparent 1.5px);
  background-size: 28px 28px;
}
/* Brand rings — upper right corner */
.ring-1 {
  position: absolute; right: -130px; top: -130px;
  width: 580px; height: 580px;
  border-radius: 50%;
  border: 70px solid rgba(0,197,160,0.06);
}
.ring-2 {
  position: absolute; right: 30px; top: 30px;
  width: 320px; height: 320px;
  border-radius: 50%;
  border: 40px solid rgba(0,197,160,0.05);
}
.ring-3 {
  position: absolute; right: 150px; top: 150px;
  width: 160px; height: 160px;
  border-radius: 50%;
  border: 20px solid rgba(0,197,160,0.06);
}
/* Horizontal accent bar at left edge */
.accent {
  position: absolute; left: 0; top: 580px;
  width: 4px; height: 200px;
  background: linear-gradient(180deg, transparent, #00C5A0, transparent);
}
/* Content anchored to bottom */
.content {
  position: absolute;
  bottom: 100px; left: 0; right: 0;
  padding: 0 72px;
  z-index: 10;
}
.tag {
  font-size: 18px; font-weight: 500;
  color: #00C5A0; letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 44px;
}
.headline {
  font-size: 84px; font-weight: 700;
  color: #FFFFFF; line-height: 1.04;
  margin-bottom: 44px;
}
.headline em { font-style: normal; color: #00C5A0; }
.line {
  width: 48px; height: 2px;
  background: #00C5A0; margin-bottom: 36px;
}
.body {
  font-size: 36px; font-weight: 400;
  color: rgba(255,255,255,0.68); line-height: 1.55;
  max-width: 840px;
}
/* Progress */
.progress-bar {
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 3px;
  background: rgba(255,255,255,0.10);
}
.progress-fill {
  height: 100%; width: 22%;
  background: #00C5A0;
}
</style>
</head>
<body>
  <div class="dots"></div>
  <div class="ring-1"></div>
  <div class="ring-2"></div>
  <div class="ring-3"></div>
  <div class="accent"></div>
  <div class="content">
    <div class="tag">Diagnóstico</div>
    <div class="headline">Fazendas que crescem<br>não têm sorte.<br><em>Têm controle.</em></div>
    <div class="line"></div>
    <div class="body">A diferença entre a fazenda que lucra e a que sobrevive está, na maioria dos casos, em quais números ela acompanha — e com qual frequência.</div>
  </div>
  <div class="progress-bar"><div class="progress-fill"></div></div>
</body>
</html>
