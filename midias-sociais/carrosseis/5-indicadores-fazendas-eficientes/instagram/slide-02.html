<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Ubuntu', sans-serif; background: #FFFFFF; position: relative; overflow: hidden; }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #00C5A0; z-index: 1; }
.content { position: absolute; bottom: 140px; left: 0; right: 0; padding: 0 72px; }
.tag { font-size: 14px; font-weight: 700; color: #00C5A0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
.headline { font-size: 72px; font-weight: 700; color: #0C2C30; line-height: 1.08; margin-bottom: 28px; }
.line { width: 48px; height: 3px; background: #00C5A0; margin-bottom: 28px; }
.body { font-size: 40px; font-weight: 400; color: #333333; line-height: 1.40; }
.progress-bar { position: absolute; bottom: 0; left: 0; width: 22%; height: 3px; background: #00C5A0; z-index: 1; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="content">
    <div class="tag">Diagnóstico</div>
    <div class="headline">Fazendas que crescem não têm sorte.</div>
    <div class="headline" style="margin-top: -10px;">Têm controle.</div>
    <div class="line"></div>
    <div class="body">A diferença entre a fazenda que lucra e a que sobrevive está, na maioria dos casos, em quais números ela acompanha — e com qual frequência.</div>
  </div>
  <div class="progress-bar"></div>
</body>
</html>
