<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  font-family: 'Ubuntu', sans-serif;
  background: linear-gradient(140deg, #061A1D 0%, #0B2E3C 55%, #071E22 100%);
  position: relative; overflow: hidden;
}
.dots {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(0,197,160,0.10) 1.5px, transparent 1.5px);
  background-size: 28px 28px;
}
/* Phone mockup — upper right, fades out downward */
.phone {
  position: absolute;
  right: -80px; top: 20px;
  width: 600px;
  z-index: 2;
  filter: drop-shadow(0 40px 80px rgba(0,0,0,0.75));
  opacity: 0.88;
}
.phone img { width: 100%; display: block; }
/* Bottom gradient to hide lower part of phone and create content zone */
.phone-fade {
  position: absolute;
  right: 0; bottom: 0;
  width: 100%; height: 680px;
  z-index: 3;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(6,26,29,0.75) 30%,
    rgba(6,26,29,0.97) 60%,
    rgba(6,26,29,1) 100%
  );
}
/* Right-side fade to blend phone into background */
.phone-right-fade {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 120px; z-index: 4;
  background: linear-gradient(90deg, transparent, rgba(6,26,29,0.9));
}
/* Brand ring — upper left */
.ring {
  position: absolute; left: -100px; top: -100px;
  width: 400px; height: 400px;
  border-radius: 50%;
  border: 50px solid rgba(0,197,160,0.05);
  z-index: 1;
}
/* Ghost number */
.ghost {
  position: absolute;
  left: 60px; bottom: 280px;
  font-size: 280px; font-weight: 700;
  color: rgba(0,197,160,0.06); line-height: 1;
  z-index: 1;
}
/* Content */
.content {
  position: absolute;
  bottom: 100px; left: 0; right: 0;
  padding: 0 72px;
  z-index: 10;
}
.tag {
  font-size: 18px; font-weight: 500;
  color: #00C5A0; letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 28px;
}
.stat-label {
  font-size: 22px; font-weight: 400;
  color: rgba(255,255,255,0.45); margin-bottom: 4px;
}
.stat {
  font-size: 130px; font-weight: 700;
  color: #00C5A0; line-height: 0.92;
  margin-bottom: 4px;
}
.stat-unit {
  font-size: 24px; font-weight: 400;
  color: rgba(255,255,255,0.50); margin-bottom: 32px;
}
.line {
  width: 48px; height: 2px;
  background: #00C5A0; margin-bottom: 24px;
}
.headline {
  font-size: 40px; font-weight: 700;
  color: #FFFFFF; margin-bottom: 16px;
}
.body {
  font-size: 30px; font-weight: 400;
  color: rgba(255,255,255,0.68); line-height: 1.52;
  max-width: 780px;
}
.progress-bar {
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 3px;
  background: rgba(255,255,255,0.10);
}
.progress-fill { height: 100%; width: 44%; background: #00C5A0; }
</style>
</head>
<body>
  <div class="dots"></div>
  <div class="ring"></div>
  <div class="phone"><img src="../imagens/tela-app.png" alt=""></div>
  <div class="phone-fade"></div>
  <div class="phone-right-fade"></div>
  <div class="ghost">01</div>
  <div class="content">
    <div class="tag">Indicador 01</div>
    <div class="stat-label">Taxa de Prenhez</div>
    <div class="stat">≥ 20%</div>
    <div class="stat-unit">ao mês</div>
    <div class="line"></div>
    <div class="headline">Eficiência reprodutiva</div>
    <div class="body">A taxa de prenhez mede quantas vacas concebem por mês. Abaixo de 20%, cada vaca vazia representa um ciclo de lactação perdido — e perda direta de receita.</div>
  </div>
  <div class="progress-bar"><div class="progress-fill"></div></div>
</body>
</html>
