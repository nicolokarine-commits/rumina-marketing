<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Ubuntu', sans-serif; background: #FFFFFF; position: relative; overflow: hidden; }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #00C5A0; z-index: 1; }
.phone { position: absolute; right: 80px; top: 180px; width: 450px; z-index: 2; }
.phone img { width: 100%; height: auto; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.20)); }
.phone-fade { position: absolute; right: 0; bottom: 100px; width: 450px; height: 200px; background: linear-gradient(180deg, transparent, #FFFFFF); z-index: 3; }
.tag { font-size: 14px; font-weight: 700; color: #00C5A0; letter-spacing: 2px; text-transform: uppercase; }
.stat-label { font-size: 18px; font-weight: 400; color: rgba(12,44,48,0.50); margin-bottom: 8px; margin-top: 20px; }
.stat-value { font-size: 56px; font-weight: 700; color: #00C5A0; line-height: 1.0; margin-bottom: 12px; }
.stat-unit { font-size: 22px; font-weight: 400; color: rgba(12,44,48,0.50); }
.headline { font-size: 44px; font-weight: 700; color: #0C2C30; line-height: 1.1; margin-bottom: 20px; }
.line { width: 48px; height: 3px; background: #00C5A0; margin-bottom: 20px; }
.body { font-size: 28px; font-weight: 400; color: #333333; line-height: 1.40; }
.content { position: absolute; bottom: 120px; left: 72px; right: 550px; }
.progress-bar { position: absolute; bottom: 0; left: 0; width: 89%; height: 3px; background: #00C5A0; z-index: 1; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="phone">
    <img src="../imagens/tela-app.png" alt="Ideagri">
    <div class="phone-fade"></div>
  </div>
  <div class="content">
    <div class="tag">Indicador 05</div>
    <div class="stat-label">CPL</div>
    <div class="stat-value">Custo</div>
    <div class="stat-unit">de Produção por Litro</div>
    <div class="line"></div>
    <div class="headline">Eficiência financeira</div>
    <div class="body">De nada adianta produzir muito se o custo consome a margem. Fazendas eficientes conhecem seu CPL mensal e ajustam antes que a conta feche no negativo.</div>
  </div>
  <div class="progress-bar"></div>
</body>
</html>
