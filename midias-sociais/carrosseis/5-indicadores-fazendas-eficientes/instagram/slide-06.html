<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  font-family: 'Ubuntu', sans-serif;
  background: linear-gradient(140deg, #061A1D 0%, #0B2E3C 55%, #071E22 100%);
  position: relative; overflow: hidden;
}
.dots {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(0,197,160,0.10) 1.5px, transparent 1.5px);
  background-size: 28px 28px;
}
.phone {
  position: absolute;
  right: -80px; top: 20px;
  width: 600px; z-index: 2;
  filter: drop-shadow(0 40px 80px rgba(0,0,0,0.75));
  opacity: 0.88;
}
.phone img { width: 100%; display: block; }
.phone-fade {
  position: absolute;
  right: 0; bottom: 0;
  width: 100%; height: 680px; z-index: 3;
  background: linear-gradient(180deg, transparent 0%, rgba(6,26,29,0.75) 30%, rgba(6,26,29,0.97) 60%, rgba(6,26,29,1) 100%);
}
.phone-right-fade {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 120px; z-index: 4;
  background: linear-gradient(90deg, transparent, rgba(6,26,29,0.9));
}
/* Ascending trend visualization — upper left */
.trend-svg {
  position: absolute;
  left: 30px; top: 60px;
  width: 420px; height: 360px;
  z-index: 2; opacity: 0.18;
}
.ring {
  position: absolute; left: -80px; top: -80px;
  width: 360px; height: 360px;
  border-radius: 50%;
  border: 45px solid rgba(0,197,160,0.05);
  z-index: 1;
}
.ghost {
  position: absolute;
  left: 60px; bottom: 280px;
  font-size: 280px; font-weight: 700;
  color: rgba(0,197,160,0.05); line-height: 1;
  z-index: 1;
}
.content {
  position: absolute;
  bottom: 100px; left: 0; right: 0;
  padding: 0 72px; z-index: 10;
}
.tag {
  font-size: 18px; font-weight: 500;
  color: #00C5A0; letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 28px;
}
.stat-label {
  font-size: 22px; font-weight: 400;
  color: rgba(255,255,255,0.45); margin-bottom: 4px;
}
.stat {
  font-size: 130px; font-weight: 700;
  color: #00C5A0; line-height: 0.92; margin-bottom: 4px;
}
.stat-unit {
  font-size: 24px; font-weight: 400;
  color: rgba(255,255,255,0.50); margin-bottom: 32px;
}
.line {
  width: 48px; height: 2px;
  background: #00C5A0; margin-bottom: 24px;
}
.headline {
  font-size: 40px; font-weight: 700;
  color: #FFFFFF; margin-bottom: 16px;
}
.body {
  font-size: 30px; font-weight: 400;
  color: rgba(255,255,255,0.68); line-height: 1.52;
  max-width: 780px;
}
.progress-bar {
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 3px;
  background: rgba(255,255,255,0.10);
}
.progress-fill { height: 100%; width: 67%; background: #00C5A0; }
</style>
</head>
<body>
  <div class="dots"></div>
  <div class="ring"></div>
  <div class="phone"><img src="../imagens/tela-app.png" alt=""></div>
  <div class="phone-fade"></div>
  <div class="phone-right-fade"></div>

  <!-- Trend bar chart — ascending (showing farm improvement) -->
  <svg class="trend-svg" viewBox="0 0 420 360" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="300" x2="420" y2="300" stroke="#00C5A0" stroke-width="2" opacity="0.4"/>
    <line x1="0" y1="220" x2="420" y2="220" stroke="#00C5A0" stroke-width="1" stroke-dasharray="6 8" opacity="0.3"/>
    <line x1="0" y1="140" x2="420" y2="140" stroke="#00C5A0" stroke-width="1" stroke-dasharray="6 8" opacity="0.3"/>
    <line x1="0" y1="60" x2="420" y2="60" stroke="#00C5A0" stroke-width="1" stroke-dasharray="6 8" opacity="0.3"/>
    <!-- Bars growing left to right -->
    <rect x="20" y="230" width="48" height="70" rx="6" fill="url(#barGrad)"/>
    <rect x="88" y="200" width="48" height="100" rx="6" fill="url(#barGrad)"/>
    <rect x="156" y="160" width="48" height="140" rx="6" fill="url(#barGrad)"/>
    <rect x="224" y="120" width="48" height="180" rx="6" fill="url(#barGrad)"/>
    <rect x="292" y="80" width="48" height="220" rx="6" fill="url(#barGrad)"/>
    <rect x="360" y="40" width="48" height="260" rx="6" fill="url(#barGrad)"/>
    <!-- Trend arrow line -->
    <polyline points="44,210 112,178 180,138 248,98 316,58 384,20" stroke="#00C5A0" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polygon points="384,20 370,30 378,8" fill="#00C5A0"/>
    <defs>
      <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#00C5A0"/>
        <stop offset="100%" stop-color="#00C5A0" stop-opacity="0.3"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="ghost">03</div>
  <div class="content">
    <div class="tag">Indicador 03</div>
    <div class="stat-label">Produção por vaca em lactação</div>
    <div class="stat">PVL</div>
    <div class="stat-unit">litros / vaca / dia</div>
    <div class="line"></div>
    <div class="headline">Eficiência individual do rebanho</div>
    <div class="body">Uma fazenda pode produzir mais com menos vacas. O PVL revela se o potencial genético do rebanho está sendo aproveitado — ou desperdiçado por falhas em nutrição ou manejo.</div>
  </div>
  <div class="progress-bar"><div class="progress-fill"></div></div>
</body>
</html>
